global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'usdcop-trading'
    environment: 'production'

# =============================================================================
# ALERT RULES - Load from config/prometheus/rules/ and alerts/
# =============================================================================
rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/alerts/*.yml

# =============================================================================
# ALERTMANAGER - Connect to AlertManager for notifications
# =============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      scheme: http
      timeout: 10s

scrape_configs:
  # =============================================================================
  # Self-monitoring
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # =============================================================================
  # ACTIVE SERVICES — verified in docker-compose.yml
  # =============================================================================

  - job_name: 'trading-api'
    static_configs:
      - targets: ['trading-api:8000']
    metrics_path: /metrics
    scrape_timeout: 10s

  - job_name: 'analytics-api'
    static_configs:
      - targets: ['analytics-api:8001']
    metrics_path: /metrics
    scrape_timeout: 10s

  - job_name: 'signalbridge-api'
    static_configs:
      - targets: ['signalbridge-api:8000']
    metrics_path: /metrics
    scrape_timeout: 10s

  - job_name: 'mlops-inference-api'
    static_configs:
      - targets: ['mlops-inference-api:8090']
    metrics_path: /metrics
    scrape_timeout: 10s

  - job_name: 'backtest-api'
    static_configs:
      - targets: ['backtest-api:8000']
    metrics_path: /metrics
    scrape_timeout: 10s

  # NOTE: redis, airflow, and mlflow targets removed (2026-03-15)
  # Redis needs redis_exporter sidecar to expose /metrics (not natively supported)
  # Airflow and MLflow do not expose Prometheus metrics by default
  # Re-add when exporters are configured
