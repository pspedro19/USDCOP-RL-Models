# =============================================================================
# USDCOP Trading System — COMPACT Edition
# =============================================================================
#
# Production-ready lean deployment: 12 core services (~6-8GB RAM).
# Includes everything needed for training, trading, dashboard, and execution.
#
# Usage:
#   docker compose -f docker-compose.compact.yml up -d          (12 services)
#   docker compose -f docker-compose.compact.yml --profile monitoring up -d  (+3 monitoring)
#
# What's included:
#   - PostgreSQL (TimescaleDB) — all data
#   - Redis — caching, pub/sub, Airflow broker
#   - MinIO — object storage (MLflow artifacts, seed backup fallback)
#   - Airflow (init + scheduler + webserver) — DAG orchestration
#   - MLflow — experiment tracking (port 5001)
#   - Trading API — market data + WebSocket (port 8000)
#   - Analytics API — trading analytics (port 8001)
#   - Backtest API — backtesting + replay (port 8003)
#   - SignalBridge — exchange OMS, paper/testnet/live (port 8085)
#   - Dashboard — Next.js frontend (port 5000)
#
# What's NOT included (use full docker-compose.yml):
#   - Vault (only needed for live trading credential encryption)
#   - Jaeger (distributed tracing — no services instrumented yet)
#   - Loki/Promtail (log aggregation — docker logs is sufficient)
#   - pgAdmin (use psql directly)
#   - data-seeder (init-scripts handle seeding)
#   - mlops-inference-api (RL inference, deprioritized)
#
# =============================================================================

networks:
  usdcop-trading-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

volumes:
  postgres_data:
  redis_data:
  minio_data:
  airflow_logs:
  airflow_plugins:
  prometheus_data:
  grafana_data:
  redpanda_data:
  kafka_bridge_data:

services:
  # ===========================================================================
  # TIER 0: Infrastructure (no dependencies)
  # ===========================================================================
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: usdcop-postgres-timescale
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TIMESCALEDB_TELEMETRY: 'off'
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      usdcop-trading-network:
        aliases:
          - postgres
          - usdcop-postgres-timescale
          - timescaledb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: usdcop-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - usdcop-trading-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: usdcop-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      usdcop-trading-network:
        aliases:
          - minio
          - usdcop-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ===========================================================================
  # TIER 1: Init services (run once, then exit)
  # ===========================================================================
  minio-init:
    image: minio/mc:latest
    container_name: usdcop-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set minio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing minio/mlflow &&
      mc mb --ignore-existing minio/99-common-trading-models &&
      mc mb --ignore-existing minio/99-common-trading-backups &&
      echo 'MinIO buckets ready.'
      "
    networks:
      - usdcop-trading-network
    restart: "no"

  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow-ml
    container_name: usdcop-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/configs:/opt/airflow/configs
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username ${AIRFLOW_USER} --firstname Admin --lastname User --role Admin --email admin@admin.com --password ${AIRFLOW_PASSWORD} &&
      airflow pools set api_requests 8 'Pool for rate-limited API requests' || true &&
      pip install -r /opt/airflow/configs/../requirements.txt || true
      "
    networks:
      - usdcop-trading-network
    restart: "no"

  # ===========================================================================
  # TIER 2: ML Platform
  # ===========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: trading-mlflow
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./mlflow_data:/mlflow
    entrypoint: >
      /bin/sh -c "
      pip install boto3 &&
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000
      "
    ports:
      - "5001:5000"
    networks:
      usdcop-trading-network:
        aliases:
          - mlflow
          - trading-mlflow
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  # ===========================================================================
  # TIER 2: Airflow Scheduler (core DAG orchestration)
  # ===========================================================================
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow-ml
    container_name: usdcop-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PYTHONPATH: /opt/airflow:/opt/airflow/dags
      POLARS_SKIP_CPU_CHECK: "1"
      TWELVEDATA_API_KEY_1: ${TWELVEDATA_API_KEY_1}
      TWELVEDATA_API_KEY_2: ${TWELVEDATA_API_KEY_2}
      TWELVEDATA_API_KEY_3: ${TWELVEDATA_API_KEY_3}
      TWELVEDATA_API_KEY_4: ${TWELVEDATA_API_KEY_4}
      TWELVEDATA_API_KEY_5: ${TWELVEDATA_API_KEY_5}
      TWELVEDATA_API_KEY_6: ${TWELVEDATA_API_KEY_6}
      TWELVEDATA_API_KEY_7: ${TWELVEDATA_API_KEY_7}
      TWELVEDATA_API_KEY_8: ${TWELVEDATA_API_KEY_8}
      API_KEY_G1_1: ${API_KEY_G1_1}
      API_KEY_G1_2: ${API_KEY_G1_2}
      API_KEY_G1_3: ${API_KEY_G1_3}
      API_KEY_G1_4: ${API_KEY_G1_4}
      API_KEY_G1_5: ${API_KEY_G1_5}
      API_KEY_G1_6: ${API_KEY_G1_6}
      API_KEY_G1_7: ${API_KEY_G1_7}
      API_KEY_G1_8: ${API_KEY_G1_8}
      API_KEY_G2_1: ${API_KEY_G2_1}
      API_KEY_G2_2: ${API_KEY_G2_2}
      API_KEY_G2_3: ${API_KEY_G2_3}
      API_KEY_G2_4: ${API_KEY_G2_4}
      API_KEY_G2_5: ${API_KEY_G2_5}
      API_KEY_G2_6: ${API_KEY_G2_6}
      API_KEY_G2_7: ${API_KEY_G2_7}
      API_KEY_G2_8: ${API_KEY_G2_8}
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://minio:9000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FRED_API_KEY: ${FRED_API_KEY}
      USDCOP_AZURE_OPENAI_API_KEY: ${USDCOP_AZURE_OPENAI_API_KEY}
      USDCOP_AZURE_OPENAI_ENDPOINT: ${USDCOP_AZURE_OPENAI_ENDPOINT}
      USDCOP_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/configs:/opt/airflow/configs
      - ./scripts:/opt/airflow/scripts:ro
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./models:/opt/airflow/models
      - ./data:/opt/airflow/data
      - ./seeds:/opt/airflow/seeds:rw
      - ./usdcop-trading-dashboard/public:/opt/airflow/usdcop-trading-dashboard/public:rw
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command: airflow scheduler
    networks:
      - usdcop-trading-network
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow-ml
    container_name: usdcop-airflow-webserver
    depends_on:
      airflow-scheduler:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PYTHONPATH: /opt/airflow:/opt/airflow/dags
      POLARS_SKIP_CPU_CHECK: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/configs:/opt/airflow/configs
      - ./scripts:/opt/airflow/scripts:ro
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./models:/opt/airflow/models
      - ./data:/opt/airflow/data
      - ./seeds:/opt/airflow/seeds:rw
      - ./usdcop-trading-dashboard/public:/opt/airflow/usdcop-trading-dashboard/public:rw
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    command: airflow webserver
    networks:
      - usdcop-trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  # ===========================================================================
  # TIER 3: API Services
  # ===========================================================================
  trading-api:
    build:
      context: ./services
      dockerfile: Dockerfile.api
      args:
        APP_FILE: trading_api_realtime.py
        PORT: 8000
    container_name: usdcop-trading-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CORS_ORIGINS=http://localhost:5000,http://localhost:3001
    ports:
      - "8000:8000"
    networks:
      usdcop-trading-network:
        aliases:
          - trading-api
          - usdcop-trading-api
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  analytics-api:
    build:
      context: ./services
      dockerfile: Dockerfile.api
      args:
        APP_FILE: trading_analytics_api.py
        PORT: 8001
    container_name: usdcop-analytics-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PORT=8001
    ports:
      - "8001:8001"
    networks:
      usdcop-trading-network:
        aliases:
          - analytics-api
          - usdcop-analytics-api
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  backtest-api:
    build:
      context: .
      dockerfile: services/inference_api/Dockerfile
    container_name: usdcop-backtest-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MODEL_PATH=/models
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./models:/models:ro
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    ports:
      - "8003:8000"
    networks:
      usdcop-trading-network:
        aliases:
          - backtest-api
          - usdcop-backtest-api
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  signalbridge-api:
    build:
      context: ./services/signalbridge_api
      dockerfile: Dockerfile
    container_name: usdcop-signalbridge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-usdcop_trading}
      - DATABASE_SYNC_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-usdcop_trading}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_here}
      - VAULT_ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-32-byte-encryption-key}
      - APP_ENV=development
      - DEBUG=true
      - SIGNALBRIDGE_DEV_MODE=true
      - TRADING_MODE=PAPER
    volumes:
      - ./services/signalbridge_api:/app
    ports:
      - "8085:8000"
    networks:
      - usdcop-trading-network
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # TIER 4: Dashboard
  # ===========================================================================
  dashboard:
    build:
      context: ./usdcop-trading-dashboard
      dockerfile: Dockerfile.prod
    container_name: usdcop-dashboard
    depends_on:
      postgres:
        condition: service_healthy
      trading-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_TRADING_API_URL: http://localhost:5000/api/proxy/trading
      NEXT_PUBLIC_ANALYTICS_API_URL: http://localhost:5000/api/analytics
      NEXT_PUBLIC_WS_TRADING_URL: ws://localhost:8000/ws
      NEXT_PUBLIC_DEV_MODE: "true"
      TRADING_API_URL: http://usdcop-trading-api:8000
      ANALYTICS_API_URL: http://usdcop-analytics-api:8001/api/analytics
      SIGNALBRIDGE_BACKEND_URL: http://usdcop-signalbridge:8000
      BACKTEST_API_URL: http://usdcop-backtest-api:8000
      BACKTEST_SERVICE_URL: http://usdcop-backtest-api:8000
      ML_ANALYTICS_URL: http://usdcop-analytics-api:8001
      NEXT_PUBLIC_INFERENCE_API_URL: http://localhost:8003
      NEXTAUTH_SECRET: usdcop-trading-secret-key-2025-production
      NEXTAUTH_URL: http://localhost:5000
      DEBUG_AUTH: "true"
      AUTH_BYPASS_ENABLED: "true"
    volumes:
      - ./usdcop-trading-dashboard/public/data:/app/public/data:ro
      - ./usdcop-trading-dashboard/public/forecasting:/app/public/forecasting:ro
    ports:
      - "5000:3000"
    networks:
      - usdcop-trading-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  # ===========================================================================
  # OPTIONAL PROFILE: monitoring
  # Usage: docker compose -f docker-compose.compact.yml --profile monitoring up -d
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: usdcop-prometheus
    profiles: ["monitoring"]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus:/etc/prometheus
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - ./config/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - usdcop-trading-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: usdcop-grafana
    profiles: ["monitoring"]
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DEFAULT_TIMEZONE: America/Bogota
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-usdcop_trading}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3002:3000"
    networks:
      - usdcop-trading-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: usdcop-alertmanager
    profiles: ["monitoring"]
    ports:
      - "9094:9093"
    volumes:
      - ./config/alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    networks:
      - usdcop-trading-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ===========================================================================
  # TIER 5: Course Project — Kafka-compatible broker + gRPC + Kafka bridges
  # ===========================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    container_name: usdcop-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "19092:19092"
      - "8082:8082"
      - "9644:9644"
    networks:
      - usdcop-trading-network
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.6.0
    container_name: usdcop-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8088:8080"
    networks:
      - usdcop-trading-network
    restart: unless-stopped

  grpc-predictor:
    build:
      context: ./services/grpc_predictor
      dockerfile: Dockerfile
    container_name: usdcop-grpc-predictor
    ports:
      - "50051:50051"
    volumes:
      - ./outputs/forecasting:/app/outputs/forecasting:ro
    networks:
      - usdcop-trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import grpc; from predictor_pb2 import HealthRequest; from predictor_pb2_grpc import PredictorServiceStub; ch=grpc.insecure_channel(\"localhost:50051\"); s=PredictorServiceStub(ch); r=s.HealthCheck(HealthRequest(), timeout=2); exit(0 if r.ready else 1)' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  kafka-bridge-producer:
    build:
      context: ./services/kafka_bridge
      dockerfile: Dockerfile
    container_name: usdcop-kafka-producer
    depends_on:
      - redpanda
      - postgres
    environment:
      MODE: producer
      KAFKA_BROKER: redpanda:9092
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/usdcop_trading
    networks:
      - usdcop-trading-network
    restart: unless-stopped
    volumes:
      - kafka_bridge_data:/data

  kafka-bridge-consumer:
    build:
      context: ./services/kafka_bridge
      dockerfile: Dockerfile
    container_name: usdcop-kafka-consumer
    depends_on:
      - redpanda
    environment:
      MODE: consumer
      KAFKA_BROKER: redpanda:9092
    networks:
      - usdcop-trading-network
    restart: unless-stopped
    volumes:
      - kafka_bridge_data:/data
