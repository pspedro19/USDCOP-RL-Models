# =============================================================================
# AlertManager Configuration - Alert Routing and Notification
# =============================================================================
# AlertManager handles alerts sent by Prometheus.
# Deduplicates, groups, and routes alerts to receivers.
#
# SETUP: To enable Slack notifications:
#   1. Get a Slack webhook URL from your workspace
#   2. Set SLACK_WEBHOOK_URL in .env
#   3. Uncomment the global slack_api_url line below
#   4. Change default receiver from 'log-only' to 'slack-trading'
#   5. Restart: docker compose restart alertmanager
# =============================================================================

global:
  resolve_timeout: 5m
  # Uncomment when Slack webhook is configured:
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

# =============================================================================
# Routing Configuration
# =============================================================================
route:
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # Default: log-only (no external notifications until Slack is configured)
  receiver: 'log-only'

  routes:
    # Critical alerts
    - match:
        severity: critical
      receiver: 'log-only'
      repeat_interval: 15m
      continue: true

    # Watchdog heartbeat (suppressed)
    - match:
        alertname: Watchdog
      receiver: 'null'
      repeat_interval: 24h

# =============================================================================
# Inhibition Rules
# =============================================================================
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  - source_match:
      alertname: 'FeatureCircuitBreakerActivated'
    target_match_re:
      alertname: 'Inference.*|Feature.*'
    equal: ['service']

  - source_match:
      alertname: 'PostgresDown'
    target_match_re:
      alertname: '.*QuerySlow.*|.*DataStale.*'

# =============================================================================
# Receivers
# =============================================================================
receivers:
  # Null receiver (drops alerts silently)
  - name: 'null'

  # Log-only receiver (alerts visible in AlertManager UI, no external push)
  - name: 'log-only'
    webhook_configs:
      - send_resolved: true
        url: 'http://localhost:9094'  # Self-reference, fails silently but alert is logged
        max_alerts: 0

