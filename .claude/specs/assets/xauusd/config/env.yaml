# Config del entorno RL (SPEC-05)
window: 64                 # barras H1 de lookback para el LSTM
action_space: [short, flat, long]
reward:
  eta: 0.005               # tasa EMA del Differential Sharpe (Moody & Saffell)
  lambda_cost: 1.0         # peso del costo de transacción
  lambda_drawdown: 0.5     # peso de la penalización por drawdown
  lambda_flip: 0.25        # peso de la penalización por invertir posición
  flip_mode: penalty       # penalty | cooldown  (elegir uno)
  cooldown_bars: 3         # si flip_mode=cooldown
episode:
  slice: walkforward_fold  # el episodio es un slice del fold
