# Gitleaks v8 configuration
# Allowlist for known development-only credentials
# These are NOT production secrets — they are Docker Compose dev defaults

title = "USDCOP-RL Gitleaks Config"

[allowlist]
description = "Development-only credentials and test fixtures"
paths = [
    '''\.env\.example''',
    '''\.env\.multimodel\.example''',
    '''tests/e2e/''',
    '''data/backups/''',
    '''\.md$''',
]
regexTarget = "line"
regexes = [
    '''admin123''',
    '''redis123''',
    '''minioadmin123''',
    '''usdcop-trading-secret-key''',
    '''ghp_[a-zA-Z0-9]{36}''',
]
